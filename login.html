<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Log in · SOIC Campus</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/tokens.css" />
<link rel="stylesheet" href="assets/css/base.css" />
<link rel="stylesheet" href="assets/css/components.css" />
<link rel="stylesheet" href="assets/css/site.css" />
</head>
<body class="grain">
<div class="auth">
  <aside class="auth-aside">
    <video autoplay muted loop playsinline poster="assets/img/campus-1.jpg"><source src="assets/video/hero.mp4" type="video/mp4" /></video>
    <a href="index.html" class="brand"><img src="assets/img/logo-soic.png" alt="SOIC" class="brand-logo" /></a>
    <div>
      <span class="kicker" style="color:var(--gold-400)">Welcome back to the campus</span>
      <p class="quote-lg" style="margin-top:16px">Your crew, your classes,<br>your <em style="color:var(--gold-400);font-style:normal">cinema</em> — in one room.</p>
    </div>
    <p class="t-xs" style="color:rgba(255,255,255,.5)">© 2026 SOIC — School of Cinema · Cairo, Egypt</p>
  </aside>

  <main class="auth-main">
    <div class="auth-card">
      <h1>Log in</h1>
      <p class="muted t-sm" style="margin-top:6px">Pick a demo account to explore the role-based experience.</p>

      <div class="demo-accts">
        <button class="demo-acct" data-demo="student" data-email="layla@soic.edu" data-pass="student123">
          <span class="avatar md" style="background:linear-gradient(135deg,#2e2740,#181522)">LM</span>
          <span class="meta"><span class="n">Layla Mansour — <span class="gold">Student</span></span><span class="e">layla@soic.edu · student123</span></span>
          <span class="go">→</span>
        </button>
        <button class="demo-acct" data-demo="instructor" data-email="asser@soic.edu" data-pass="teach123">
          <span class="avatar md" style="background:linear-gradient(135deg,#2b2622,#15130f)">MA</span>
          <span class="meta"><span class="n">Dr. Mohamed Asser — <span class="gold">Instructor</span></span><span class="e">asser@soic.edu · teach123</span></span>
          <span class="go">→</span>
        </button>
      </div>

      <div class="rule" style="margin-bottom:20px">or sign in manually</div>

      <form id="loginForm" class="stack" style="--s-4:16px">
        <div class="field">
          <label for="email">Email</label>
          <div class="input-group"><span class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg></span><input class="input" id="email" type="email" placeholder="you@soic.edu" value="layla@soic.edu" /></div>
        </div>
        <div class="field">
          <label for="pass">Password</label>
          <div class="input-group"><span class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span><input class="input" id="pass" type="password" placeholder="••••••••" value="student123" /></div>
          <div class="hint" id="loginHint"></div>
        </div>
        <div class="row between t-sm">
          <label class="row" style="gap:8px"><input type="checkbox" checked style="accent-color:var(--gold-500)" /> Remember me</label>
          <a href="#" class="link">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block">Log in</button>
      </form>

      <p class="muted t-sm" style="text-align:center;margin-top:22px">New to SOIC? <a href="apply.html" class="link">Apply to a program</a></p>
    </div>
  </main>
</div>

<script src="assets/js/main.js"></script>
<script>
(function () {
  const ACCOUNTS = {
    "layla@soic.edu": { pass: "student123", role: "student", go: "app.html" },
    "asser@soic.edu": { pass: "teach123", role: "instructor", go: "instructor.html" },
  };
  const emailEl = document.getElementById("email"), passEl = document.getElementById("pass"), hint = document.getElementById("loginHint");
  document.querySelectorAll(".demo-acct").forEach(b => b.addEventListener("click", () => {
    emailEl.value = b.dataset.email; passEl.value = b.dataset.pass;
    login();
  }));
  function login() {
    const acc = ACCOUNTS[emailEl.value.trim().toLowerCase()];
    if (acc && acc.pass === passEl.value) {
      try { localStorage.setItem("soic-role", acc.role); localStorage.setItem("soic-auth", "1"); } catch (e) {}
      window.location.href = acc.go;
    } else {
      hint.textContent = "Invalid email or password. Try a demo account above.";
      document.getElementById("pass").closest(".field").classList.add("invalid");
    }
  }
  document.getElementById("loginForm").addEventListener("submit", (e) => { e.preventDefault(); login(); });
})();
</script>
</body>
</html>
