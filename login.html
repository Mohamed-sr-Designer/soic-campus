<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Log in · SOIC Campus</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/tokens.css" />
<link rel="stylesheet" href="assets/css/base.css" />
<link rel="stylesheet" href="assets/css/components.css" />
<link rel="stylesheet" href="assets/css/site.css" />
</head>
<body class="grain">
<div class="auth">
  <aside class="auth-aside">
    <video autoplay muted loop playsinline poster="assets/img/campus-1.jpg"><source src="assets/video/hero.mp4" type="video/mp4" /></video>
    <a href="index.html" class="brand"><img src="assets/img/logo-soic.png" alt="SOIC" class="brand-logo" /></a>
    <div>
      <span class="kicker" style="color:var(--gold-400)">Welcome back to the campus</span>
      <p class="quote-lg" style="margin-top:16px">Your crew, your classes,<br>your <em style="color:var(--gold-400);font-style:normal">cinema</em> — in one room.</p>
    </div>
    <p class="t-xs" style="color:rgba(255,255,255,.5)">© 2026 SOIC — School of Cinema · Cairo, Egypt</p>
  </aside>

  <main class="auth-main">
    <div class="auth-card">
      <h1>Log in</h1>
      <p class="muted t-sm" style="margin-top:6px">Pick a demo account to explore the role-based experience.</p>

      <div class="demo-accts">
        <button class="demo-acct" data-demo="student" data-email="layla@soic.edu" data-pass="student123">
          <span class="avatar md" style="background:linear-gradient(135deg,#2e2740,#181522)">LM</span>
          <span class="meta"><span class="n">Layla Mansour — <span class="gold">Student</span></span><span class="e">layla@soic.edu · student123</span></span>
          <span class="go">→</span>
        </button>
        <button class="demo-acct" data-demo="instructor" data-email="asser@soic.edu" data-pass="teach123">
          <span class="avatar md" style="background:linear-gradient(135deg,#2b2622,#15130f)">MA</span>
          <span class="meta"><span class="n">Dr. Mohamed Asser — <span class="gold">Instructor</span></span><span class="e">asser@soic.edu · teach123</span></span>
          <span class="go">→</span>
        </button>
      </div>

      <p class="muted t-sm" style="text-align:center;margin-top:8px">Tap an account to enter the campus.</p>
      <p class="muted t-sm" style="text-align:center;margin-top:18px">New to SOIC? <a href="apply.html" class="link">Apply to a program</a></p>
    </div>
  </main>
</div>

<script src="assets/js/main.js"></script>
<script>
document.querySelectorAll(".demo-acct").forEach(b => b.addEventListener("click", () => {
  const role = b.dataset.demo;
  try { localStorage.setItem("soic-role", role); localStorage.setItem("soic-auth", "1"); } catch (e) {}
  window.location.href = role === "instructor" ? "instructor.html" : "app.html";
}));
</script>
</body>
</html>
